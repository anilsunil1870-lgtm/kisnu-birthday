<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    background:linear-gradient(
    135deg,
    #ff9a9e,
    #fad0c4,
    #ffd1dc
    );

    font-family:Arial,sans-serif;
}

h1{
    font-size:4rem;
    color:white;
    margin-bottom:15px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

.subtitle{
    color:white;
    font-size:1.4rem;
    margin-bottom:30px;
}

.candle{
    font-size:70px;
    margin-bottom:-20px;
    transition:0.5s;
}

.cake{
    font-size:180px;
}

button{

    padding:15px 35px;

    border:none;

    border-radius:30px;

    background:#ff4d6d;

    color:white;

    font-size:20px;

    cursor:pointer;

    margin-top:20px;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#cakeSlice{
    display:none;
    font-size:90px;
    margin-top:20px;
    animation:pop 1s ease;
}

#albumBtn{
    display:none;

    margin-top:10px;

    text-decoration:none;

    background:#ff4d6d;

    color:white;

    padding:15px 35px;

    border-radius:30px;

    font-size:20px;
}

@keyframes pop{

    0%{
        transform:scale(0);
    }

    100%{
        transform:scale(1);
    }

}

.heart{

    position:absolute;

    color:white;

    font-size:25px;

    animation:float 8s linear infinite;

    opacity:.6;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120px);
    }

}

</style>
</head>
<body>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:25%;animation-delay:1s">❤️</div>
<div class="heart" style="left:40%;animation-delay:2s">❤️</div>
<div class="heart" style="left:60%;animation-delay:3s">❤️</div>
<div class="heart" style="left:75%;animation-delay:4s">❤️</div>
<div class="heart" style="left:90%;animation-delay:5s">❤️</div>

<h1>Happy Birthday Kisnu ❤️</h1>

<p class="subtitle">
Make a wish before blowing out the candle ✨
</p>

<div class="candle" id="candle">
🕯️
</div>

<div class="cake">
🎂
</div>

<button onclick="blowCandle()">
Blow Candle 🎉
</button>

<div id="cakeSlice">
🍰
</div>

<a href="gallery.html" id="albumBtn">
Open My Birthday Album ❤️
</a>

<script>

function blowCandle(){

    document.getElementById("candle").innerHTML = "💨";

    document.getElementById("cakeSlice").style.display = "block";

    document.getElementById("albumBtn").style.display = "inline-block";

}

</script>

</body>
</html>
